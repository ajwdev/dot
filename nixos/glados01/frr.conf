! FRR configuration for glados01 (core router)

! Zebra config
ip forwarding
ipv6 forwarding

! VRF to VNI mappings
vrf vrf-cell1
 vni 1000
exit-vrf
!
vrf vrf-cell2
 vni 2000
exit-vrf
!
vrf vrf-cell3
 vni 3000
exit-vrf
!
! BGP config
router bgp 64512
  bgp router-id 10.255.0.1
  no bgp ebgp-requires-policy

  ! Peer group for node-level FRR (EVPN/VXLAN)
  ! Connects from physical IPs (10.0.2.x), advertises loopbacks
  ! Uses external to accept any private AS (65011, 65012, 65013, etc.)
  neighbor frr peer-group
  neighbor frr remote-as external
  bgp listen range 10.0.2.0/24 peer-group frr

  ! Peer group for Cilium BGP (LoadBalancer advertisements)
  ! Connects from loopback IPs (10.0.255.x) after FRR advertises them
  ! Same AS as node FRR (65011, 65012, 65013, etc.)
  neighbor cilium peer-group
  neighbor cilium remote-as external
  neighbor cilium ebgp-multihop 2
  neighbor cilium disable-connected-check
  bgp listen range 10.0.255.0/24 peer-group cilium

  ! Networks to advertise
  address-family ipv4 unicast
    network 10.255.0.1/32
    ! Import kernel routes (including default) for VRF route leaking
    redistribute kernel
    ! Import cell routes so return traffic can find its way back
    import vrf vrf-cell1
    import vrf vrf-cell2
    import vrf vrf-cell3
    ! Accept LB pool advertisements from Cilium
    neighbor cilium soft-reconfiguration inbound
    ! Accept routes from node FRR
    neighbor frr soft-reconfiguration inbound
  exit-address-family

  ! EVPN address family for node FRR (VXLAN overlay)
  address-family l2vpn evpn
    neighbor frr activate
    neighbor frr soft-reconfiguration inbound
    advertise-all-vni
    !
    ! L2 VNI config for Type-2/Type-3 routes (bridging, BUM flooding)
    vni 100
      rd 10.255.0.1:100
      route-target both 64512:100
    exit-vni
    vni 200
      rd 10.255.0.1:200
      route-target both 64512:200
    exit-vni
    vni 300
      rd 10.255.0.1:300
      route-target both 64512:300
    exit-vni
  exit-address-family
!
! Per-VRF BGP for route advertisement
! Route leaking: import default route from global table for internet access
router bgp 64512 vrf vrf-cell1
  bgp router-id 10.255.0.1
  !
  address-family ipv4 unicast
    redistribute connected
    import vrf default
  exit-address-family
  !
  address-family l2vpn evpn
    rd 10.255.0.1:1000
    route-target both 64512:1000
    advertise ipv4 unicast
  exit-address-family
!
router bgp 64512 vrf vrf-cell2
  bgp router-id 10.255.0.1
  !
  address-family ipv4 unicast
    redistribute connected
    import vrf default
  exit-address-family
  !
  address-family l2vpn evpn
    rd 10.255.0.1:2000
    route-target both 64512:2000
    advertise ipv4 unicast
  exit-address-family
!
router bgp 64512 vrf vrf-cell3
  bgp router-id 10.255.0.1
  !
  address-family ipv4 unicast
    redistribute connected
    import vrf default
  exit-address-family
  !
  address-family l2vpn evpn
    rd 10.255.0.1:3000
    route-target both 64512:3000
    advertise ipv4 unicast
  exit-address-family
!
